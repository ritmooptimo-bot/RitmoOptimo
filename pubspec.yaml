name: ritmooptimo_mobile
description: RitmoOptimo — Plataforma de Coaching Deportivo con IA
publish_to: none
version: 4.6.0+6

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ───────────────────────────────────────────────
  go_router: ^14.0.0

  # ── HTTP & API ───────────────────────────────────────────────
  dio: ^5.4.3+1

  # ── Local Storage ────────────────────────────────────────────
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # ── BLE (Heart Rate Monitors) ────────────────────────────────
  flutter_blue_plus: ^1.32.12

  # ── GPS / Location ───────────────────────────────────────────
  geolocator: ^12.0.0
  latlong2: ^0.9.0

  # ── UI Components ────────────────────────────────────────────
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0

  # ── Utils ────────────────────────────────────────────────────
  intl: ^0.19.0
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0

  # ── Device Pairing (deep links + device ID) ──────────────────
  app_links: ^6.3.2
  device_info_plus: ^10.1.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_lints: ^4.0.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Formula1
      fonts:
        - asset: assets/fonts/Rajdhani-Regular.ttf
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: RobotoMono
      fonts:
        - asset: assets/fonts/RobotoMono-Regular.ttf
        - asset: assets/fonts/RobotoMono-Medium.ttf
          weight: 500
