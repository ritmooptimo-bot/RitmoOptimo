name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink

      # Nombre fijo → URL de descarga siempre la misma
      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ritmooptimo-latest.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ritmooptimo-apk
          path: build/app/outputs/flutter-apk/ritmooptimo-latest.apk
          retention-days: 90

      # Borra el release "latest" anterior y crea uno nuevo
      # URL siempre fija: /releases/download/latest/ritmooptimo-latest.apk
      - name: Delete existing latest release
        continue-on-error: true
        run: gh release delete latest --yes --cleanup-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          DATE=$(date +%Y-%m-%d)
          gh release create latest \
            --title "Ritmo Óptimo v${VERSION} (${DATE})" \
            --notes "## 📱 Descarga directa para Android

          **Activa 'Instalar desde fuentes desconocidas'** en Ajustes → Seguridad antes de instalar.

          Compilado: ${DATE} · Commit: \`${{ github.sha }}\`" \
            build/app/outputs/flutter-apk/ritmooptimo-latest.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
