name: Build & Deploy APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-shrink

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ritmooptimo-latest.apk

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: ritmooptimo-apk
          path: build/app/outputs/flutter-apk/ritmooptimo-latest.apk
          retention-days: 90

      - name: Deploy APK to Hostinger via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 82.198.229.25
          port: 65002
          username: u323441816
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          source: build/app/outputs/flutter-apk/ritmooptimo-latest.apk
          target: /home/u323441816/domains/ritmooptimo.tech/public_html/apk/
          strip_components: 4
